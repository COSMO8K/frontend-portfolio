<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Спасибо</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .box {
        background: #fff;
        padding: 40px 30px;
        border-radius: 12px;
        max-width: 400px;
        width: 100%;
        text-align: center;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        animation: fadeIn 0.6s ease;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 15px;
      }

      p {
        font-size: 14px;
        color: #555;
        margin-bottom: 15px;
      }

      .telegram {
        display: inline-block;
        margin-top: 10px;
        color: #0088cc;
        font-weight: bold;
        text-decoration: none;
      }

      .telegram:hover {
        text-decoration: underline;
      }

      .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: #000;
        color: #fff;
        border-radius: 6px;
        text-decoration: none;
        transition: 0.3s;
      }

      .btn:hover {
        background: #333;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="box">
      <h1>Спасибо за сообщение 🙌</h1>

      <p>Я получил вашу заявку и скоро свяжусь с вами.</p>

      <p>Обычно отвечаю в течение дня.</p>

      <a href="https://t.me/COSMO8K" target="_blank" class="telegram">
        Написать в Telegram
      </a>

      <br />

      <a href="index.html" class="btn">Вернуться на сайт</a>
    </div>
  </body>
</html>
